services:
  - type: web
    name: northstar-erp-demo
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/shawnrucks/northstar-erp-demo
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate:postgres && npm run db:seed:postgres
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: northstar-erp-db
          property: connectionString
      - key: NORTHSTAR_DEMO_PASSWORD
        value: Demo123!
      - key: NORTHSTAR_DEMO_DATE
        value: 2026-07-12
      - key: NORTHSTAR_DATABASE_POOL_MAX
        value: "5"
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

databases:
  - name: northstar-erp-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "17"
    databaseName: northstar_erp
    user: northstar_erp
    diskSizeGB: 1
    storageAutoscalingEnabled: false
    ipAllowList: []

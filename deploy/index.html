<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Launch the live Northstar Industrial Components manufacturing ERP demo." />
    <meta http-equiv="refresh" content="1;url=https://northstar-erp-demo.onrender.com/" />
    <title>Northstar ERP — Live Demo</title>
    <style>
      :root {
        color-scheme: light;
        --navy: #102f46;
        --blue: #1f6f9f;
        --pale: #eef5f8;
        --line: #d7e2e8;
        --muted: #607581;
      }

      * { box-sizing: border-box; }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 15% 15%, #d8eaf2 0, transparent 32rem),
          linear-gradient(145deg, #f8fafb, var(--pale));
        color: var(--navy);
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 24px 70px rgba(16, 47, 70, 0.14);
        max-width: 620px;
        padding: 44px;
        width: 100%;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 14px;
      }

      .mark {
        align-items: center;
        background: var(--navy);
        border-radius: 10px;
        color: #fff;
        display: flex;
        font: 700 28px Georgia, serif;
        height: 52px;
        justify-content: center;
        width: 52px;
      }

      .brand strong { display: block; font-size: 17px; }
      .brand span { color: var(--muted); font-size: 12px; }

      h1 {
        font: 700 clamp(32px, 7vw, 48px)/1.08 Georgia, serif;
        letter-spacing: -0.025em;
        margin: 40px 0 16px;
      }

      p { color: var(--muted); font-size: 16px; line-height: 1.65; }

      a {
        background: var(--blue);
        border-radius: 8px;
        color: #fff;
        display: inline-block;
        font-weight: 700;
        margin-top: 20px;
        padding: 13px 19px;
        text-decoration: none;
      }

      small { color: var(--muted); display: block; margin-top: 24px; }

      @media (max-width: 520px) {
        main { padding: 30px 24px; }
      }
    </style>
    <script>
      window.setTimeout(() => window.location.replace("https://northstar-erp-demo.onrender.com/"), 250);
    </script>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark" aria-hidden="true">N</div>
        <div>
          <strong>Northstar Industrial Components</strong>
          <span>Manufacturing ERP demonstration</span>
        </div>
      </div>
      <h1>Opening the live ERP.</h1>
      <p>The production demo uses Render-hosted Next.js and persistent PostgreSQL data.</p>
      <a href="https://northstar-erp-demo.onrender.com/">Launch Northstar ERP</a>
      <small>If you are not redirected automatically, use the launch button.</small>
    </main>
  </body>
</html>

<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Northstar Industrial Components ERP</title><meta name="description" content="Functional manufacturing ERP demonstration"><style>
:root{--navy:#102f46;--blue:#1f6f9f;--bg:#f3f5f6;--line:#dbe3e7;--muted:#6c7d87;--red:#ad3d43;--green:#247556;--amber:#9d620f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1d2e39;font:14px Arial,sans-serif}button,input,select,textarea{font:inherit}button,a{cursor:pointer}.hidden{display:none!important}.brand{align-items:center;display:flex;gap:10px}.brand i{align-items:center;background:#fff;color:var(--blue);display:flex;font:700 24px Georgia;height:38px;justify-content:center;width:38px}.brand b{display:flex;flex-direction:column}.brand small{font-size:7px;letter-spacing:.15em;margin-top:4px}.login{display:grid;grid-template-columns:55% 45%;min-height:100vh}.login>section:first-child{background:linear-gradient(145deg,#173e58,#0b263a);color:#d6e3ea;display:flex;flex-direction:column;justify-content:space-between;padding:55px 8vw}.login h1{color:#fff;font:46px/1.15 Georgia;margin:15px 0;max-width:600px}.login .intro{line-height:1.7;max-width:620px}.login aside{border:1px solid #ffffff24;display:grid;grid-template-columns:repeat(3,1fr);padding:20px}.login aside h3{grid-column:1/-1}.login aside p{display:flex;flex-direction:column}.login aside small{color:#91a8b5}.login>section:last-child{align-items:center;display:flex;justify-content:center}.login form{background:#fff;box-shadow:0 15px 45px #17364c18;padding:42px;width:440px}.login form>small,.eyebrow{color:var(--blue);font-size:9px;font-weight:bold;letter-spacing:.15em}.login h2{font:29px Georgia}.login label{display:flex;flex-direction:column;font-size:11px;font-weight:bold;gap:7px;margin:18px 0}.login input,.login select,.login textarea{border:1px solid #bdc9d0;min-height:44px;padding:10px}.primary{background:var(--blue);border:0;border-radius:3px;color:#fff;font-weight:bold;padding:11px 14px}.login .primary{width:100%}.demo{background:#edf4f7;font-size:11px;margin-top:18px;padding:13px}.shell{display:grid;grid-template-columns:245px 1fr;min-height:100vh}.side{background:var(--navy);color:#b9c :.06em;padding:10px 12px;text-align:left;text-transform:uppercase}td{border-top:1px solid #e5eaed;font-size:10px;padding:11px 12px}td a{color:var(--blue);font-weight:bold}.badge{border-radius:3px;display:inline-block;font-size:8px;font-weight:bold;padding:5px 7px;text-transform:uppercase}.badge.red{background:#fae7e8;color:var(--red)}.badge.amber{background:#fff0d9;color:var(--amber)}.badge.green{background:#e1f1e8;color:var(--green)}.badge.blue{background:#e4eff6;color:var(--blue)}.queues{display:grid;gap:12px;grid-template-columns:repeat(3,1fr)}.queue{align-items:center;display:flex;gap:14px;min-height:120px;padding:20px}.queue>i{background:#e6f0f6;color:var(--blue);font-size:20px;padding:12px}.queue div{flex:1}.queue h2{font-size:13px;margin:0}.queue p{color:var(--muted);font-size:9px}.record-meta{background:#fff;border:1px solid var(--line);display:flex;gap:55px;margin-bottom:14px;padding:15px}.record-meta div{display:flex;flex-direction:column;gap:6px}.record-meta small{color:var(--muted);font-size:8px}.details{display:grid;grid-template-columns:repeat(3,1fr);padding:12px}.details div{border-bottom:1px solid #e5eaed;display:flex;flex-direction:column;padding:12px}.details small{color:var(--muted);font-size:9px;text-transform:capitalize}.details b{font-size:11px;margin-top:6px}.actions{display:flex;flex-wrap:wrap;gap:7px}.warning{background:#fff0d9;color:#80510f;margin:14px;padding:13px}.match,.costs{display:grid;grid-template-columns:repeat(3,1fr)}.match>div{border-right:1px solid var(--line);padding:18px}.match p{display:flex;justify-content:space-between}.match .variance{background:#fff4ef}.costs{grid-template-columns:repeat(4,1fr)}.costs span{display:flex;flex-direction:column;padding:15px}.costs b{font-size:13px;margin-top:5px}.modal-bg{align-items:center;background:#071b2b99;display:flex;inset:0;justify-content:center;position:fixed;z-index:50}.modal{background:#fff;padding:25px;width:500px}.modal>div:first-child{align-items:center;display:flex;justify-content:space-between}.modal h2{font:24px Georgia;margin:0}.modal label{display:flex;flex-direction:column;font-size:10px;font-weight:bold;gap:6px;margin:15px 0}.modal input,.modal textarea{border:1px solid #bdc9d0;min-height:42px;padding:9px}.modal textarea{min-height:100px}.modal footer{display:flex;gap:8px;justify-content:flex-end}.toast{background:var(--green);bottom:20px;color:#fff;padding:14px 20px;position:fixed;right:20px}.report{display:grid;gap:14px;grid-template-columns:.8fr 1.2fr}.report label{display:flex;flex-direction:column;font-size:10px;font-weight:bold;gap:7px;margin:18px}.report textarea{min-height:110px;padding:10px}.report .actions{margin:18px}.empty{color:var(--muted);padding:25px;text-align:center}@media(max-width:900px){.login{grid-template-columns:1fr}.login>section:first-child{display:none}.shell{grid-template-columns:180px 1fr}.metrics{grid-template-columns:repeat(2,1fr)}.queues{grid-template-columns:1fr}.grid3,.report{grid-template-columns:1fr}}
</style></head><body><div id="app"></div><div id="modal"></div><script>
const seed={user:null,records:{
'RFQ-2026-1047':{type:'RFQ',title:'Custom Mounting Bracket',party:'Apex Motion Systems',status:'MISSING_INFORMATION',priority:'HIGH',owner:'Elena Torres',due:'2026-07-17',data:{quantity:2500,item:'NS-BR-442',drawingNumber:'AMS-442',drawingRevision:'',material:'A36 carbon steel',packaging:'',requestedDelivery:'2026-08-26',missing:'Drawing revision, Packaging requirement'}},
'QT-2026-1047':{type:'QUOTE',title:'Custom Mounting Bracket quotation',party:'Apex Motion Systems',status:'AWAITING_APPROVAL',priority:'HIGH',owner:'Elena Torres',due:'2026-07-17',data:{rfq:'RFQ-2026-1047',materialCost:18750,outsideProcessing:6500,laborCost:9240,machineCost:11700,setupTooling:7200,packagingFreight:2950,totalCost:64043,revenue:84950,margin:'24.6%',approval:'SALES MANAGER'}},
'SO-41882':{type:'SALES ORDER',title:'2,500 × NS-BR-442',party:'Apex Motion Systems',status:'MATERIAL_PENDING',priority:'HIGH',owner:'Elena Torres',due:'2026-08-21',data:{customerPO:'AMS-PO-77192',quantity:2500,item:'NS-BR-442'}},
'WO-23891':{type:'WORK ORDER',title:'Custom Mounting Bracket',party:'Apex Motion Systems',status:'MATERIAL_PENDING',priority:'HIGH',owner:'Priya Shah',due:'2026-08-16',data:{salesOrder:'SO-41882',quantity:2500,location:'Denver Manufacturing',workCenter:'WC-CNC-04',delayReason:'Awaiting A36 steel'}},
'PO-10482':{type:'PURCHASE ORDER',title:'6,200 LB A36 Steel Sheet',party:'Summit Steel Supply',status:'AWAITING_CONFIRMATION',priority:'URGENT',owner:'Caleb Wright',due:'2026-07-24',data:{quantity:'6,200 LB',unitCost:'$1.18',requiredDate:'2026-07-24',confirmation:'AWAITING RESPONSE',contact:'orders@summitsteel.example',promisedDate:'—'}},
'MS-3021':{type:'MATERIAL SHORTAGE',title:'A36 Steel Sheet shortage',party:'Apex Motion Systems',status:'OPEN',priority:'HIGH',owner:'Priya Shah',due:'2026-07-22',data:{workOrder:'WO-23891',salesOrder:'SO-41882',required:'6,200 LB',denver:'1,800 LB',fortCollins:'2,200 LB',aurora:'900 LB',remainingShortage:'1,300 LB',purchaseOrder:'PO-10482'}},
'PE-1187':{type:'PRODUCTION EXCEPTION',title:'Material shortage threatens WO-23891',party:'Apex Motion Systems',status:'OPEN',priority:'HIGH',owner:'Priya Shah',due:'2026-07-20',data:{type:'MATERIAL SHORTAGE',workOrder:'WO-23891',productionImpact:'Work order cannot release',customerImpact:'Requested ship date at risk',estimatedCompletion:'2026-08-18'}},
'INV-SUM-8821':{type:'INVOICE',title:'Summit Steel Supply invoice',party:'Summit Steel Supply',status:'PRICE_EXCEPTION',priority:'HIGH',owner:'Nina Foster',due:'2026-08-03',data:{purchaseOrder:'PO-10482',receipt:'RCV-20991',quantity:'6,200 LB',poUnitPrice:'$1.18',invoiceUnitPrice:'$1.27',variance:'7.63%',tolerance:'2%',hold:'No'}},
'QH-4491':{type:'QUALITY HOLD',title:'Final inspection documentation missing',party:'Apex Motion Systems',status:'QUALITY_HOLD',priority:'HIGH',owner:'Marcus Lee',due:'2026-07-15',data:{salesOrder:'SO-41882',workOrder:'WO-23891'}}},audit:[],communications:[],tasks:[],reports:[]};
let state=JSON.parse(localStorage.getItem('northstar-demo')||'null')||structuredClone(seed),view=location.hash.slice(1)||'login';const $=s=>document.querySelector(s),save=()=>localStorage.setItem('northstar-demo',JSON.stringify(state));
function badge(v){let t=/HOLD|EXCEPTION|URGENT|ESCALATED|OUTSIDE/.test(v)?'red':/APPROVED|SUBMITTED|FINAL|CONFIRMED/.test(v)?'green':/AWAITING|MISSING|PENDING|HIGH/.test(v)?'amber':'blue';return `<span class="badge ${t}">${v.replaceAll('_',' ')}</span>`}function nav(v){view=v;location.hash=v;render()}window.addEventListener('hashchange',()=>{view=location.hash.slice(1)||'login';render()});
function login(){return `<main class="login"><section><div class="brand"><i>N</i><b>Northstar<small>INDUSTRIAL COMPONENTS</small></b></div><div><p class="eyebrow">MANUFACTURING OPERATIONS PORTAL</p><h1>One view of the work that keeps production moving.</h1><p class="intro">Secure access to customer demand, estimating, purchasing, production planning, inventory, quality, shipping, and finance operations.</p></div><aside><h3>Northstar operating network</h3><p><b>Denver Manufacturing</b><small>Machining · Final assembly</small></p><p><b>Fort Collins Fabrication</b><small>Fabrication · Welding</small></p><p><b>Aurora Distribution</b><small>Materials · Finished goods</small></p></aside></section><section><form onsubmit="doLogin(event)"><small>AUTHORIZED EMPLOYEE ACCESS</small><h2>Sign in to Northstar ERP</h2><p>Use a seeded demo account.</p><label>Email address<select id="email"><option>operations@northstar-demo.com</option><option>sales@northstar-demo.com</option><option>buyer@northstar-demo.com</option><option>planner@northstar-demo.com</option><option>ap@northstar-demo.com</option><option>quality@northstar-demo.com</option><option>admin@northstar-demo.com</option></select></label><label>Password<input id="password" type="password" value="Demo123!"></label><button class="primary">Sign in →</button><div class="demo"><b>Demo credentials</b><br>Password for all accounts: <code>Demo123!</code></div></form></section></main>`}function doLogin(e){e.preventDefault();if($('#password').value!=='Demo123!')return alert('Incorrect demo password.');let email=$('#email').value,role=email.split('@')[0].replace('operations','Operations Analyst').replace('sales','Sales Coordinator').replace('buyer','Buyer').replace('planner','Production Planner').replace('ap','Accounts Payable').replace('quality','Quality Specialist').replace('admin','ERP Administrator');state.user={email,name:role,role};eventLog(email,'Login','Session started');save();nav('dashboard')}
const navs=[['Dashboard','dashboard'],['Customers','customers'],['RFQs & Quotes','rfqs'],['Sales Orders','sales'],['Production Planning','planning'],['Work Orders','work-orders'],['Purchasing','purchasing'],['Suppliers','suppliers'],['Inventory','inventory'],['Quality','quality'],['Shipping','shipping'],['Invoices','invoices'],['Work Queues','queues'],['Reports','reports'],['Audit Log','audit'],['Administration','admin']];function shell(content){return `<div class="shell"><aside class="side"><div class="brand"><i>N</i><b>Northstar<small>INDUSTRIAL COMPONENTS</small></b></div><nav>${navs.map(n=>`<button class="${view===n[1]?'active':''}" onclick="nav('${n[1]}')">${n[0]}</button>`).join('')}</nav><div class="user"><span>${(state.user?.name||'Demo User').split(' ').map(x=>x[0]).join('').slice(0,2)}</span><div><b>${state.user?.name}</b><small>${state.user?.role}</small></div><button onclick="logout()">Log out</button></div></aside><main class="main"><header>⌕　<input onkeydown="if(event.key==='Enter')search(this.value)" placeholder="Search RFQ, PO, work order, invoice, customer, supplier or SKU…"><span>Denver Manufacturing　● LIVE DEMO</span></header>${content}</main></div>`}function title(a,b,c=''){return `<div class="title"><div><small class="eyebrow">${a}</small><h1>${b}</h1><p>${c}</p></div></div>`}function logout(){eventLog(state.user.email,'Logout','Session ended');state.user=null;save();nav('login')}
function counts(){let rs=Object.values(state.records);return {rfq:rs.filter(x=>x.type==='RFQ'&&x.status==='MISSING_INFORMATION').length,quote:rs.filter(x=>x.type==='QUOTE'&&x.status==='AWAITING_APPROVAL').length,short:rs.filter(x=>x.type==='MATERIAL SHORTAGE'&&x.status!=='RESOLVED').length,po:rs.filter(x=>x.type==='PURCHASE ORDER'&&x.status.includes('AWAITING')).length,wo:rs.filter(x=>x.type==='WORK ORDER'&&x.status==='MATERIAL_PENDING').length,quality:rs.filter(x=>x.type==='QUALITY HOLD').length,invoice:rs.filter(x=>x.type==='INVOICE'&&!['MATCHED','PAID'].includes(x.status)).length}}function dashboard(){let c=counts(),cards=[['New RFQs',6],['Quotes Awaiting Approval',c.quote],['Orders on Hold',1],['Material Shortages',c.short],['Purchase Orders Past Due',15],['Work Orders at Risk',c.wo],['Quality Holds',c.quality],['Shipments Due Today',3],['Supplier Confirmations Missing',c.po],['Invoice Exceptions',c.invoice]];return shell(`<div class="page">${title('OPERATIONS COMMAND CENTER','Manufacturing operations overview','Live workload and exception status across Northstar facilities.')}<div class="metrics">${cards.map(x=>`<div class="metric"><small>${x[0]}</small><b>${x[1]}</b><span>VIEW QUEUE →</span></div>`).join('')}</div><div class="grid3"><section class="panel stat"><div class="panel-head"><h2>Production status</h2></div>${[['Scheduled today',12],['Started',8],['Completed',5],['Waiting for material',c.wo]].map(x=>`<p><span>${x[0]}</span><b>${x[1]}</b></p>`).join('')}</section><section class="panel stat"><div class="panel-head"><h2>Supply-chain status</h2></div>${[['POs due this week',22],['POs overdue',15],['Missing confirmation',c.po],['Material shortages',c.short]].map(x=>`<p><span>${x[0]}</span><b>${x[1]}</b></p>`).join('')}</section><section class="panel stat"><div class="panel-head"><h2>Customer commitments</h2></div>${[['Orders due this week',14],['Orders at risk',6],['Late orders',2],['Waiting for response',4]].map(x=>`<p><span>${x[0]}</span><b>${x[1]}</b></p>`).join('')}</section></div>${recordTable(Object.entries(state.records))}</div>`)}
function recordTable(entries){return `<section class="panel"><div class="panel-head"><h2>Attention required</h2><span>${entries.length} records</span></div><table><thead><tr><th>Priority</th><th>Type</th><th>Record</th><th>Customer / Supplier</th><th>Due</th><th>Owner</th><th>Status</th><th></th></tr></thead><tbody>${entries.map(([n,r])=>`<tr><td>${badge(r.priority)}</td><td>${r.type}</td><td><b>${n}</b></td><td>${r.party}</td><td>${r.due}</td><td>${r.owner}</td><td>${badge(r.status)}</td><td><a onclick="nav('record/${n}')">Open →</a></td></tr>`).join('')}</tbody></table></section>`}function list(type,label){let e=Object.entries(state.records).filter(([,r])=>!type||r.type.includes(type));return shell(`<div class="page">${title('NORTHSTAR ERP',label,'Search, sort, filter, and open operational records.')}${recordTable(e)}</div>`)}function queues(){let c=counts(),q=[['New RFQs',6],['RFQ Missing Information',c.rfq],['Quotes Awaiting Approval',c.quote],['Orders on Hold',1],['PO Awaiting Confirmation',c.po],['Past Due POs',15],['Material Shortages',c.short],['Work Orders at Risk',c.wo],['Production Exceptions',1],['Quality Holds',c.quality],['Invoice Exceptions',c.invoice],['Customer Updates Required',5]];return shell(`<div class="page">${title('WORK MANAGEMENT','Work queues','Manual operational work awaiting review or action.')}<div class="queues">${q.map(x=>`<a class="queue" onclick="nav('dashboard')"><i>▤</i><div><h2>${x[0]}</h2><p>Review, assign, prioritize, and open records.</p><b>${x[1]} open</b></div>→</a>`).join('')}</div></div>`)}
function recordPage(n){let r=state.records[n];if(!r)return dashboard();let actions={RFQ:[['Request Customer Information','requestInfo'],['Record Customer Response','rfqResponse']],QUOTE:[['Approve Quote','approveQuote'],['Submit to Customer','submitQuote']], 'PURCHASE ORDER':[['Send Supplier Follow-up','poFollowup'],['Record Confirmation','confirmPO'],['Create Expedite Task','task']], 'MATERIAL SHORTAGE':[['Create Transfer Request','transfer'],['Create Expedite Task','task'],['Escalate Remaining Shortage','escalate']], 'PRODUCTION EXCEPTION':[['Update & Escalate','exception']],INVOICE:[['Place Invoice on Hold','invoiceHold'],['Request Buyer Review','task'],['Request Supplier Credit','credit']]}[r.type]||[['Add Note','note']];let special='';if(r.type==='QUOTE')special=`<section class="panel"><div class="panel-head"><h2>Quote costing</h2>${badge(r.data.approval+' APPROVAL')}</div><div class="costs">${Object.entries(r.data).filter(x=>/Cost|Freight|total|revenue|margin/.test(x[0])).map(x=>`<span>${label(x[0])}<b>${typeof x[1]==='number'?'$'+x[1].toLocaleString():x[1]}</b></span>`).join('')}</div></section>`;if(r.type==='INVOICE')special=`<section class="panel"><div class="panel-head"><h2>Three-way match</h2>${badge('OUTSIDE TOLERANCE')}</div><div class="match"><div><h3>Purchase order</h3><p>PO <b>${r.data.purchaseOrder}</b></p><p>Unit price <b>${r.data.poUnitPrice}</b></p></div><div><h3>Receipt</h3><p>Receipt <b>${r.data.receipt}</b></p><p>Accepted <b>${r.data.quantity}</b></p></div><div class="variance"><h3>Invoice</h3><p>Unit price <b>${r.data.invoiceUnitPrice}</b></p><p>Price variance <b>${r.data.variance}</b></p><p>Tolerance <b>${r.data.tolerance}</b></p></div></div></section>`;return shell(`<div class="page">${title(r.type,`${n} · ${r.title}`,`Last updated in this live browser session`,` `)}<div class="actions" style="margin-bottom:14px">${actions.map(a=>`<button class="primary" data-testid="${n.toLowerCase()}-${a[1]}-button" onclick="actionModal('${n}','${a[1]}','${a[0]}')">${a[0]}</button>`).join('')}</div><div class="record-meta"><div><small>STATUS</small>${badge(r.status)}</div><div><small>OWNER</small><b>${r.owner}</b></div><div><small>PRIORITY</small>${badge(r.priority)}</div><div><small>DUE DATE</small><b>${r.due}</b></div></div>${special}<section class="panel"><div class="panel-head"><h2>Record details</h2></div><div class="details">${Object.entries(r.data).map(x=>`<div><small>${label(x[0])}</small><b>${x[1]||'—'}</b></div>`).join('')}</div>${r.data.missing?`<div class="warning"><b>Missing required information</b><p>! ${r.data.missing}</p></div>`:''}</section>${auditTable(state.audit.filter(x=>x.record===n))}</div>`)}function label(x){return x.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase())}
function actionModal(n,a,t){let fields=a==='rfqResponse'?'<label>Drawing revision<input name="revision" value="C"></label><label>Packaging requirement<input name="packaging" value="25 units per reinforced carton"></label>':a==='poFollowup'?'<label>Supplier contact<input name="recipient" value="orders@summitsteel.example"></label><label>Message<textarea name="message">Please confirm pricing and the required delivery date.</textarea></label>':a==='confirmPO'?'<label>Revised promised date<input name="date" type="date"></label>':a==='transfer'?'<label>From location<select name="from"><option>Fort Collins Fabrication</option><option>Aurora Distribution</option></select></label><label>Quantity (LB)<input name="quantity" value="2200"></label>':a==='exception'?'<label>Customer impact<textarea name="impact">Requested ship date at risk</textarea></label><label>Estimated completion<input name="date" type="date" value="2026-08-18"></label>':a==='requestInfo'||a==='credit'?'<label>Message<textarea name="message">Please provide the information required to continue processing this record.</textarea></label>':'<label>Note / task details<textarea name="note"></textarea></label>';$('#modal').innerHTML=`<div class="modal-bg"><form class="modal" onsubmit="runAction(event,'${n}','${a}','${t}')"><div><h2>${t}</h2><button type="button" onclick="closeModal()">×</button></div>${fields}<footer><button type="button" onclick="closeModal()">Cancel</button><button class="primary">${t}</button></footer></form></div>`}function closeModal(){$('#modal').innerHTML=''}function runAction(e,n,a,t){e.preventDefault();let r=state.records[n],f=Object.fromEntries(new FormData(e.target));if(a==='rfqResponse'){r.data.drawingRevision=f.revision;r.data.packaging=f.packaging;r.data.missing='';r.status='COSTING'}if(a==='approveQuote')r.status='APPROVED';if(a==='submitQuote'){if(r.status!=='APPROVED')return alert('This quote cannot be submitted because Sales Manager approval is still required.');r.status='SUBMITTED'}if(a==='confirmPO'){r.status='CONFIRMED';r.data.confirmation='REVISED DATE';r.data.promisedDate=f.date||'2026-07-26'}if(a==='escalate'||a==='exception')r.status='ESCALATED';if(a==='invoiceHold'){r.status='ON_HOLD';r.data.hold='Yes'}if(a==='task')state.tasks.push({record:n,title:f.note||t,status:'OPEN',owner:r.owner});if(['requestInfo','poFollowup','credit','submitQuote'].includes(a))state.communications.push({record:n,type:t,date:new Date().toISOString()});if(a==='transfer')r.data['transfer '+(Object.keys(r.data).filter(x=>x.startsWith('transfer')).length+1)]=`${f.quantity} LB from ${f.from} · SUBMITTED`;eventLog(n,t,JSON.stringify(f));save();closeModal();toast('Saved successfully');render()}
function eventLog(record,action,note){state.audit.unshift({time:new Date().toLocaleString(),user:state.user?.name||'Demo User',role:state.user?.role||'Visitor',record,action,note})}function auditTable(rows=state.audit){return `<section class="panel"><div class="panel-head"><h2>Audit history</h2><span>IMMUTABLE DEMO LOG</span></div>${rows.length?`<table><thead><tr><th>Timestamp</th><th>User</th><th>Record</th><th>Action</th><th>Note</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.time}</td><td>${x.user}<br><small>${x.role}</small></td><td>${x.record}</td><td>${x.action}</td><td>${x.note}</td></tr>`).join('')}</tbody></table>`:'<p class="empty">No actions recorded in this browser session.</p>'}</section>`}function audit(){return shell(`<div class="page">${title('SYSTEM OF RECORD','Audit Log','Every workflow action persists in this browser.')}${auditTable()}</div>`)}function reports(){let c=counts();return shell(`<div class="page">${title('OPERATIONS REPORTING','Daily Operations Report','Create, review, and finalize a management-ready brief.')}<div class="report"><section class="panel stat"><div class="panel-head"><h2>Live metrics snapshot</h2></div>${[['Work orders at risk',c.wo],['Material shortages',c.short],['Past due POs',15],['Missing confirmations',c.po],['Quality holds',c.quality],['Invoice exceptions',c.invoice]].map(x=>`<p><span>${x[0]}</span><b>${x[1]}</b></p>`).join('')}</section><form class="panel" onsubmit="saveReport(event)"><div class="panel-head"><h2>Create Daily Operations Report</h2></div><label>Executive summary<textarea name="summary" required placeholder="Summarize the operating picture and key risks…"></textarea></label><label>Required management decisions<textarea name="decisions" placeholder="List decisions, owners, and required timing…"></textarea></label><div class="actions"><button name="mode" value="DRAFT" class="primary">Save Draft</button><button name="mode" value="FINAL" class="primary">Mark Final</button></div></form></div><section class="panel"><div class="panel-head"><h2>Saved reports</h2></div>${state.reports.length?state.reports.map(x=>`<p style="padding:14px"><b>${x.number}</b> · ${x.status} · ${x.date}</p>`).join(''):'<p class="empty">No reports created yet.</p>'}</section></div>`)}function saveReport(e){e.preventDefault();let f=new FormData(e.target),status=e.submitter.value,n='DOR-'+new Date().toISOString().slice(0,10).replaceAll('-','')+'-'+String(state.reports.length+1).padStart(2,'0');state.reports.unshift({number:n,status,date:new Date().toLocaleDateString(),summary:f.get('summary'),decisions:f.get('decisions')});eventLog(n,status==='FINAL'?'Report finalized':'Report created','Daily operations report');save();toast('Report '+status.toLowerCase()+' saved');render()}
function search(q){let found=Object.keys(state.records).find(n=>n.toLowerCase().includes(q.toLowerCase())||state.records[n].title.toLowerCase().includes(q.toLowerCase()));if(found)nav('record/'+found);else toast('No matching record')};function toast(s){let d=document.createElement('div');d.className='toast';d.textContent=s;document.body.append(d);setTimeout(()=>d.remove(),1800)}function render(){if(view!=='login'&&!state.user)view='login';let out=view==='login'?login():view==='dashboard'?dashboard():view==='queues'?queues():view==='reports'?reports():view==='audit'?audit():view.startsWith('record/')?recordPage(view.split('/')[1]):view==='rfqs'?list('RFQ','RFQs and Quotes'):view==='sales'?list('SALES','Sales Orders'):view==='work-orders'||view==='planning'?list('WORK ORDER','Work Orders & Production Planning'):view==='purchasing'?list('PURCHASE','Purchase Orders'):view==='invoices'?list('INVOICE','Supplier Invoices'):view==='quality'?list('QUALITY','Quality Holds'):list('',label(view));$('#app').innerHTML=out}render();
</script></body></html>
